# GUI monitor defaults for local display checks.
# The GUI remains optional and must be built with WITH_GUI=1.
profile = profiles/file-cleanup.profile
audio_backend = default
sample_rate = 48000
channels = 2
block_size = 256
meter_interval_ms = 1000
tui = off
gui = on
