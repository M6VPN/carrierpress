# carrierpress/configs/live-pulse.conf

# Linux host live-audio defaults for PipeWire/PulseAudio style systems.
# This file does not configure CAT, PTT, radio, or station control.
profile = profiles/am-safe.profile
audio_backend = pulse
sample_rate = 48000
channels = 2
block_size = 256
meter_interval_ms = 1000
tui = on
gui = off
