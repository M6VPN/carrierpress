# carrierpress/configs/playout.conf

# WAV playout workflow defaults.
# File paths and playlist entries remain command-line or playlist inputs.
profile = profiles/file-cleanup.profile
audio_backend = default
output_device = -1
sample_rate = 48000
channels = 2
block_size = 256
meter_interval_ms = 1000
tui = off
gui = off
